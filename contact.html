<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Me</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      color: white;
      background: #000;
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(0,0,0,0.75), rgba(20,0,0,0.9)),
        url("your-background.jpg") center/cover no-repeat;
      z-index: -1;
    }

    /* NAVBAR */
    nav {
      background: rgba(0,0,0,0.9);
      border-bottom: 2px solid #ff0000;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
    }

    .logo {
      color: #ffcc00;
      font-weight: bold;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .nav-links a:hover {
      color: #ffcc00;
    }

    .menu-toggle {
      display: none;
      font-size: 1.8rem;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .nav-links {
        position: absolute;
        top: 70px;
        right: 0;
        width: 100%;
        background: rgba(0,0,0,0.95);
        flex-direction: column;
        align-items: center;
        display: none;
        padding: 20px 0;
      }

      .nav-links.active {
        display: flex;
      }

      .menu-toggle {
        display: block;
      }
    }

    /* CONTENT */
    .container {
      max-width: 700px;
      margin: 80px auto;
      padding: 40px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      text-align: center;
    }

    h1 {
      color: yellow;
      margin-bottom: 10px;
    }

    .subtitle {
      margin-bottom: 30px;
      color: #ccc;
    }

    /* FORM */
    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input, textarea {
      padding: 12px;
      border: 2px solid red;
      border-radius: 8px;
      background: rgba(0,0,0,0.6);
      color: white;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: yellow;
    }

    button {
      padding: 12px;
      border: none;
      background: red;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border-radius: 8px;
      transition: 0.3s;
    }

    button:hover {
      background: yellow;
      color: black;
    }
  </style>
</head>

<body>

<nav>
  <div class="logo">Portfolio</div>

  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Digital Media</a></li>
    <li><a href="about.html">About Me</a></li>
    <li><a href="contact.html">Contact Me</a></li>
  </ul>

  <div class="menu-toggle" id="menuToggle">☰</div>
</nav>

<div class="container">
  <h1>Contact Me</h1>

  <!-- EDIT THIS SUBTITLE -->
  <p class="subtitle">Send me a message here!.</p>

  <form>
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>
    <textarea rows="5" placeholder="Your Message" required></textarea>
    <button type="submit">Send Message</button>
  </form>
</div>

<script>
  const menuToggle = document.getElementById("menuToggle");
  const navLinks = document.getElementById("navLinks");

  menuToggle.addEventListener("click", () => {
    navLinks.classList.toggle("active");
  });
</script>

</body>
</html>
