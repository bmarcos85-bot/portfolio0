<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      color: white;
      background: #000;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background image */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(20, 0, 0, 0.8)),
        url("your-background-image.jpg") center/cover no-repeat;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 0, 0, 0.08), rgba(255, 204, 0, 0.06));
      z-index: -1;
    }

    nav {
      width: 100%;
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.85);
      border-bottom: 2px solid #ff0000;
      backdrop-filter: blur(8px);
    }

    .nav-container {
      max-width: 1200px;
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 24px;
    }

    .nav-logo {
      color: #ffcc00;
      font-size: 1.4rem;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: white;
      font-weight: bold;
      transition: 0.3s ease;
    }

    .nav-links a:hover {
      color: #ffcc00;
    }

    .hero {
      text-align: center;
      padding: 100px 20px 60px;
    }

    .hero h1 {
      font-size: 4rem;
      color: #ffcc00;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 15px;
      text-shadow: 0 0 12px rgba(255, 204, 0, 0.4);
    }

    .hero p {
      font-size: 1.2rem;
      color: #ffffff;
      max-width: 700px;
      margin: auto;
      line-height: 1.6;
    }

    .projects {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .projects h2 {
      text-align: center;
      color: #ff0000;
      font-size: 2.2rem;
      margin-bottom: 35px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
    }

    .project-card {
      background: rgba(20, 20, 20, 0.92);
      border: 2px solid #ff0000;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      text-decoration: none;
      display: block;
    }

    .project-card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: #ffcc00;
      box-shadow: 0 0 20px rgba(255, 204, 0, 0.2);
    }

    .project-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    .project-card h3 {
      padding: 18px;
      text-align: center;
      color: #ffcc00;
      font-size: 1.1rem;
    }

    @media (max-width: 768px) {
      .hero h1 {
        font-size: 2.8rem;
      }

      .nav-container {
        flex-direction: column;
        gap: 14px;
      }

      .nav-links {
        flex-wrap: wrap;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-container">
      <div class="nav-logo">My Portfolio</div>
      <ul class="nav-links">
        <li><a href="#">Digital Media</a></li>
        <li><a href="#">About Me</a></li>
        <li><a href="#">Contact Me</a></li>
      </ul>
    </div>
  </nav>

  <section class="hero">
    <h1>Portfolio</h1>
    <!-- Change the subtitle text below -->
    <p>This is an archive space for the new digital media art i've created.</p>
  </section>

  <section class="projects">
    <h2>Featured Projects</h2>

    <div class="project-grid">
      <a href="project-logo.html" class="project-card">
        <img src="iliaa.jpg" alt="Logo Project">
        <h3>Logo</h3>
      </a>

      <a href="project-glitch-art.html" class="project-card">
        <img src="Brainsucculenooot.png" alt="Glitch Art Project">
        <h3>Glitch Art</h3>
      </a>

      <a href="project-meme-mashup.html" class="project-card">
        <img src="grassy.jpg" alt="Meme Mashup Project">
        <h3>Meme Mashup</h3>
      </a>

      <a href="project-virtual-space.html" class="project-card">
        <img src="DeskScenerender.png" alt="Virtual Space Project">
        <h3>Virtual Space</h3>
      </a>

      <a href="project-net-art.html" class="project-card">
        <img src="net-art.jpg" alt="Net Art Project">
        <h3>Net Art</h3>
      </a>
    </div>
  </section>

</body>
</html>
