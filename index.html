<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      color: white;
      background: #000;
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(0,0,0,0.75), rgba(20,0,0,0.8)),
      url("your-background-image.jpg") center/cover no-repeat;
      z-index: -1;
    }

    /* NAVBAR */
    nav {
      background: rgba(0,0,0,0.9);
      border-bottom: 2px solid #ff0000;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 1.3rem;
      font-weight: bold;
      color: #ffcc00;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #ffcc00;
    }

    .menu-toggle {
      display: none;
      font-size: 1.8rem;
      cursor: pointer;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .nav-links {
        position: absolute;
        top: 70px;
        right: 0;
        width: 100%;
        background: rgba(0,0,0,0.95);
        flex-direction: column;
        align-items: center;
        display: none;
        padding: 20px 0;
      }

      .nav-links.active {
        display: flex;
      }

      .menu-toggle {
        display: block;
      }
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h1 {
      color: #ffcc00;
      font-size: 3rem;
    }

    .projects {
      padding: 40px;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .project-card {
      border: 2px solid red;
      border-radius: 10px;
      overflow: hidden;
      text-decoration: none;
      color: white;
    }

    .project-card:hover {
      border-color: yellow;
    }

    .project-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .project-card h3 {
      text-align: center;
      padding: 10px;
      color: yellow;
    }
  </style>
</head>

<body>

<nav>
  <div class="logo">Portfolio</div>

  <ul class="nav-links" id="navLinks">
  <li><a href="index.html">Digital Media</a></li>
  <li><a href="about.html">About Me</a></li>
  <li><a href="contact.html">Contact Me</a></li>
</ul>

  <div class="menu-toggle" id="menuToggle">☰</div>
</nav>

<section class="hero">
  <h1>Portfolio</h1>
  <p>This is an archive space for the new digital media art I've created.</p>
</section>

<section class="projects">
  <div class="project-grid">

    <a href="project-logo.html" class="project-card">
      <img src="iliaa.jpg">
      <h3>Logo</h3>
    </a>

    <a href="project-glitch-art.html" class="project-card">
      <img src="Brainsucculenooot.png">
      <h3>Glitch Art</h3>
    </a>

    <a href="project-meme-mashup.html" class="project-card">
      <img src="grassy.jpg">
      <h3>Meme Mashup</h3>
    </a>

    <a href="project-virtual-space.html" class="project-card">
      <img src="DeskScenerender.png">
      <h3>Virtual Space</h3>
    </a>

    <a href="project-net-art.html" class="project-card">
      <img src="theboys.jpg">
      <h3>Net Art</h3>
    </a>

  </div>
</section>

<script>
  const menuToggle = document.getElementById("menuToggle");
  const navLinks = document.getElementById("navLinks");

  menuToggle.addEventListener("click", () => {
    navLinks.classList.toggle("active");
  });
</script>

</body>
</html>
